name: Build and Push to ECR

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  IMAGE_NAME: tiny-health-app
  ECR_REPO: 172030246706.dkr.ecr.eu-north-1.amazonaws.com/my-app
  AWS_REGION: eu-north-1

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::172030246706:role/omargithubactionrole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: image-tag
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          IMAGE_TAG="${TODAY}-${GITHUB_RUN_ID}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:${{ steps.image-tag.outputs.image_tag }} .

      - name: Tag image (multi-tag)
        run: |
          docker tag $IMAGE_NAME:${{ steps.image-tag.outputs.image_tag }} \
          $ECR_REPO:${{ steps.image-tag.outputs.image_tag }}

          docker tag $IMAGE_NAME:${{ steps.image-tag.outputs.image_tag }} \
          $ECR_REPO:latest

      - name: Push image to ECR
        run: |
          docker push $ECR_REPO:${{ steps.image-tag.outputs.image_tag }}
          docker push $ECR_REPO:latest